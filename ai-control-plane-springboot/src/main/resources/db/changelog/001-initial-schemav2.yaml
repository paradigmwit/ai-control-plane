databaseChangeLog:

  - changeSet:
      id: 000-create-schema
      author: control-plane
      changes:
        - sql:
            dbms: h2,postgresql
            splitStatements: false
            stripComments: true
            sql: CREATE SCHEMA IF NOT EXISTS control_plane;

  - changeSet:
      id: 001-create-plan
      author: ai-control-plane
      changes:
        - createTable:
            schemaName: control_plane
            tableName: plan
            columns:
              - column:
                  name: plan_id
                  type: varchar(100)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: metadata
                  type: CLOB
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP

  - changeSet:
      id: 002-create-step
      author: ai-control-plane
      changes:
        - createTable:
            schemaName: control_plane
            tableName: step
            columns:
              - column:
                  name: step_id
                  type: varchar(100)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: plan_id
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: tool_name
                  type: varchar(150)
                  constraints:
                    nullable: false
              - column:
                  name: input_payload
                  type: CLOB
              - column:
                  name: metadata
                  type: CLOB
        - addUniqueConstraint:
            schemaName: control_plane
            tableName: step
            columnNames: plan_id, step_id
            constraintName: uk_step
        - addForeignKeyConstraint:
            baseTableSchemaName: control_plane
            baseTableName: step
            baseColumnNames: plan_id
            referencedTableSchemaName: control_plane
            referencedTableName: plan
            referencedColumnNames: plan_id
            constraintName: fk_step_plan
            onDelete: CASCADE

  - changeSet:
      id: 003-create-step-dependency
      author: ai-control-plane
      changes:
        - createTable:
            schemaName: control_plane
            tableName: step_dependency
            columns:
              - column:
                  name: step_dependency_id
                  type: varchar(100)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: plan_id
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: step_id
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: depends_on_step_id
                  type: varchar(100)
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            schemaName: control_plane
            tableName: step_dependency
            columnNames: plan_id, step_id, depends_on_step_id
            constraintName: uk_step_dependency
        - addForeignKeyConstraint:
            baseTableSchemaName: control_plane
            baseTableName: step_dependency
            baseColumnNames: plan_id, step_id
            referencedTableSchemaName: control_plane
            referencedTableName: step
            referencedColumnNames: plan_id, step_id
            constraintName: fk_dependency_step
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableSchemaName: control_plane
            baseTableName: step_dependency
            baseColumnNames: plan_id, depends_on_step_id
            referencedTableSchemaName: control_plane
            referencedTableName: step
            referencedColumnNames: plan_id, step_id
            constraintName: fk_dependency_parent
            onDelete: CASCADE

  - changeSet:
      id: 004-create-instance
      author: ai-control-plane
      changes:
        - createTable:
            schemaName: control_plane
            tableName: instance
            columns:
              - column:
                  name: instance_id
                  type: varchar(100)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: plan_id
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(50)
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: started_at
                  type: timestamp
              - column:
                  name: completed_at
                  type: timestamp
              - column:
                  name: total_cost
                  type: numeric(12,4)
        - addForeignKeyConstraint:
            baseTableSchemaName: control_plane
            baseTableName: instance
            baseColumnNames: plan_id
            referencedTableSchemaName: control_plane
            referencedTableName: plan
            referencedColumnNames: plan_id
            constraintName: fk_execution_plan

  - changeSet:
      id: 005-create-step-execution
      author: control-plane
      changes:
        - createTable:
            schemaName: control_plane
            tableName: step_execution
            columns:
              - column:
                  name: step_execution_id
                  type: varchar(100)
                  constraints:
                    nullable: false
                    primaryKey: true
              - column:
                  name: instance_id
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: step_id
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(50)
              - column:
                  name: output_payload
                  type: CLOB
              - column:
                  name: error_message
                  type: CLOB
              - column:
                  name: started_at
                  type: timestamp
              - column:
                  name: completed_at
                  type: timestamp
              - column:
                  name: execution_time_ms
                  type: bigint
              - column:
                  name: step_cost
                  type: numeric(12,4)
        - addUniqueConstraint:
            schemaName: control_plane
            tableName: step_execution
            columnNames: instance_id, step_id
            constraintName: uk_step_execution
        - addForeignKeyConstraint:
            baseTableSchemaName: control_plane
            baseTableName: step_execution
            baseColumnNames: instance_id
            referencedTableSchemaName: control_plane
            referencedTableName: instance
            referencedColumnNames: instance_id
            constraintName: fk_step_instance
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableSchemaName: control_plane
            baseTableName: step_execution
            baseColumnNames: step_id
            referencedTableSchemaName: control_plane
            referencedTableName: step
            referencedColumnNames: step_id
            constraintName: fk_step_execution_step
            onDelete: CASCADE

  - changeSet:
      id: 006-create-llm-metadata
      author: ai-control-plane
      changes:
        - createTable:
            schemaName: control_plane
            tableName: llm_metadata
            columns:
              - column:
                  name: instance_id
                  type: varchar(100)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: provider_id
                  type: varchar(100)
              - column:
                  name: model_name
                  type: varchar(100)
              - column:
                  name: prompt_tokens
                  type: int
              - column:
                  name: completion_tokens
                  type: int
              - column:
                  name: llm_cost
                  type: numeric(12,4)
              - column:
                  name: raw_response
                  type: CLOB
        - addForeignKeyConstraint:
            baseTableSchemaName: control_plane
            baseTableName: llm_metadata
            baseColumnNames: instance_id
            referencedTableSchemaName: control_plane
            referencedTableName: instance
            referencedColumnNames: instance_id
            constraintName: fk_llm_execution
            onDelete: CASCADE

  - changeSet:
      id: 007-add-indexes
      author: ai-control-plane
      changes:
        - createIndex:
            schemaName: control_plane
            tableName: instance
            indexName: idx_execution_status
            columns:
              - column:
                  name: status
        - createIndex:
            schemaName: control_plane
            tableName: instance
            indexName: idx_execution_plan
            columns:
              - column:
                  name: plan_id
        - createIndex:
            schemaName: control_plane
            tableName: step_execution
            indexName: idx_step_execution_status
            columns:
              - column:
                  name: status
        - createIndex:
            schemaName: control_plane
            tableName: step_execution
            indexName: idx_step_instance
            columns:
              - column:
                  name: instance_id

  - changeSet:
      id: 007-add-instance-user-id
      author: ai-control-plane
      changes:
        - addColumn:
            schemaName: control_plane
            tableName: instance
            columns:
              - column:
                  name: user_id
                  type: varchar(100)
                  defaultValue: anonymousUser
                  constraints:
                    nullable: false
        - createIndex:
            schemaName: control_plane
            tableName: instance
            indexName: idx_instance_user
            columns:
              - column:
                  name: user_id
